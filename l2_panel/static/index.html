<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>L2.5 — Üretim Paneli</title>
<style>
  :root {
    --bg: #f5f7f9; --surface: #ffffff; --surface-2: #eef1f5; --inset: #f8fafc;
    --text: #15202e; --muted: #5c6b7e; --border: #dde3ea;
    --accent: #0d9488; --accent-ink: #0a6b62; --accent-soft: #d6f2ee;
    --ok: #16a34a; --ok-soft: #dcfce7; --warn: #d97706; --warn-soft: #fef1dc;
    --err: #dc2626; --err-soft: #fde2e2; --idle: #64748b;
    --radius: 10px; --shadow: 0 1px 2px rgba(16,32,48,.06), 0 6px 20px rgba(16,32,48,.05);
    --sans: -apple-system, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1218; --surface: #161d26; --surface-2: #1d2631; --inset: #10161d;
      --text: #e6eef6; --muted: #8b99ab; --border: #28323e;
      --accent: #2dd4bf; --accent-ink: #5eead4; --accent-soft: #113631;
      --ok: #34d399; --ok-soft: #0f2e22; --warn: #fbbf24; --warn-soft: #33280d;
      --err: #f87171; --err-soft: #331616; --idle: #7c8aa0;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans);
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 22px 60px; }

  header.top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  header.top h1 { font-size: 18px; font-weight: 650; letter-spacing: -.01em; margin: 0; }
  header.top .sub { color: var(--muted); font-size: 12.5px; }
  header.top .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--idle); display: inline-block; }

  .grid { display: grid; grid-template-columns: 400px 1fr; gap: 18px; align-items: start; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px 16px 18px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    margin: 0 0 14px; font-weight: 600; }

  label.fld { display: block; margin-bottom: 13px; }
  label.fld > span { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 550; }
  input, select { width: 100%; font: inherit; color: var(--text); background: var(--inset);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  input[type=checkbox] { width: auto; }
  .hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .tokline { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 12px; font-family: var(--mono); }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; font-family: var(--sans); }
  .b-ok { background: var(--ok-soft); color: var(--ok); }
  .b-warn { background: var(--warn-soft); color: var(--warn); }
  .b-err { background: var(--err-soft); color: var(--err); }
  .b-idle { background: var(--surface-2); color: var(--muted); }

  .opts label { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; }

  button.primary { width: 100%; margin-top: 6px; background: var(--accent); color: #fff; border: 0;
    padding: 11px; border-radius: 9px; font: inherit; font-weight: 650; cursor: pointer; letter-spacing: .01em; }
  button.primary:hover { background: var(--accent-ink); }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--err); border: 1px solid var(--border);
    padding: 9px 14px; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer; }
  button.ghost:disabled { opacity: .45; cursor: not-allowed; }

  /* progress */
  .phase { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .phase .pill { padding: 4px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 650; }
  .p-idle { background: var(--surface-2); color: var(--muted); }
  .p-prompt { background: var(--warn-soft); color: var(--warn); }
  .p-video { background: var(--accent-soft); color: var(--accent-ink); }
  .p-done { background: var(--ok-soft); color: var(--ok); }
  .p-err { background: var(--err-soft); color: var(--err); }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--inset); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; }
  .stat .n { font-family: var(--mono); font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .stat .k { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat.done .n { color: var(--ok); } .stat.prod .n { color: var(--warn); } .stat.err .n { color: var(--err); }

  .section-t { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    margin: 14px 0 7px; font-weight: 600; }
  ul.list { list-style: none; margin: 0; padding: 0; }
  ul.list li { display: flex; gap: 8px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 12.5px; }
  ul.list li:last-child { border-bottom: 0; }
  .chip { flex: none; font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 6px; font-family: var(--sans); }
  .c-err { background: var(--err-soft); color: var(--err); }
  .c-soft { background: var(--accent-soft); color: var(--accent-ink); }
  .mono-sm { font-family: var(--mono); font-size: 11.5px; color: var(--muted); word-break: break-word; }
  .warns { background: var(--inset); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
    max-height: 190px; overflow-y: auto; }
  .warns div { font-family: var(--mono); font-size: 11.5px; padding: 2px 0; color: var(--text); white-space: pre-wrap; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 8px 2px; }
  .waiting { background: var(--warn-soft); color: var(--warn); border-radius: 9px; padding: 14px; text-align: center;
    font-weight: 600; font-size: 13px; }
  .proj-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .actions { display: flex; gap: 10px; margin-top: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>L2.5 Üretim Paneli</h1>
    <span class="sub">Studio JSON'u yerelde üret · başlat + izle</span>
    <span style="margin-left:auto" class="sub"><span class="dot" id="livedot"></span> <span id="livetxt">boşta</span></span>
  </header>

  <div class="grid">
    <!-- SOL: Kur & Başlat -->
    <div class="card" id="setup">
      <h2>Kur &amp; Başlat</h2>
      <div id="keys" style="margin-bottom:14px; padding-bottom:13px; border-bottom:1px solid var(--border)">
        <div class="section-t" style="margin:0 0 8px">API Anahtarları
          <span style="text-transform:none;font-weight:400;color:var(--muted)">— oturum belleği, diske yazılmaz; env'de varsa gerekmez</span></div>
        <label class="fld" style="margin-bottom:8px"><span>GEMINI_API_KEY <span id="st-GEMINI_API_KEY"></span></span>
          <input type="password" id="k-GEMINI_API_KEY" autocomplete="off" placeholder="AIza… (Senaryo B — prompt üretimi)" /></label>
        <label class="fld" style="margin-bottom:0"><span>ANTHROPIC_API_KEY <span id="st-ANTHROPIC_API_KEY"></span></span>
          <input type="password" id="k-ANTHROPIC_API_KEY" autocomplete="off" placeholder="sk-ant… (S4 soften — opsiyonel)" /></label>
      </div>

      <label class="fld">
        <span>Model</span>
        <select id="model"></select>
        <div class="hint" id="modelhint"></div>
      </label>

      <div id="creds"></div>
      <div id="opts" class="opts"></div>

      <label class="fld">
        <span>Üretilecek Proje (içerik / video)</span>
        <select id="project"></select>
        <div class="proj-badges" id="projbadges"></div>
        <div class="hint" id="preflight"></div>
      </label>

      <div class="row">
        <label class="fld"><span>Varyantlar</span>
          <div class="hint" style="padding-top:9px" id="varnote">Prompt JSON'da dolu olanlar üretilir (sayıyı Gemini belirleyecek — L1)</div></label>
        <label class="fld"><span>Eşzamanlılık</span>
          <input id="concurrency" type="number" min="1" max="6" value="2" />
          <div class="hint">2 önerilir (ölçülen tavan)</div></label>
      </div>
      <label class="fld"><span>Sahneler (opsiyonel — boş = hepsi)</span>
        <input id="scenes" placeholder="örn: 1-2  (küçük test için)" />
        <div class="hint">Aralık: <code>1-2</code> · tek: <code>3</code> · boş: tüm proje</div></label>

      <button class="primary" id="startBtn" disabled>Başlat</button>
      <div class="hint" id="startmsg" style="margin-top:8px"></div>
    </div>

    <!-- SAĞ: Canlı İlerleme -->
    <div class="card" id="prog">
      <h2>Canlı İlerleme</h2>
      <div id="progbody">
        <div class="empty">Bir koşu başlatın — ilerleme burada görünür.</div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let MODELS = {}, POLL = null, CURRENT = null, ENV_SET = {}, SCENARIO = null;

function mask(v){ if(!v) return ""; if(v.length<=10) return v; return v.slice(0,6)+"…"+v.slice(-4); }
function renderEnv(){
  const bd=k=>`<span class="badge ${ENV_SET[k]?"b-ok":"b-warn"}">${ENV_SET[k]?"✓ var":"✗ yok"}</span>`;
  $("#st-GEMINI_API_KEY").innerHTML = bd("GEMINI_API_KEY");
  $("#st-ANTHROPIC_API_KEY").innerHTML = bd("ANTHROPIC_API_KEY");
}
let keyTimer = {};
function bindKeys(){
  ["GEMINI_API_KEY","ANTHROPIC_API_KEY"].forEach(k=>{
    $("#k-"+k).oninput = e=>{
      clearTimeout(keyTimer[k]);
      keyTimer[k] = setTimeout(async ()=>{
        const {d} = await jpost("/keys", {[k]: e.target.value});   // RAM'e al, diske GITMEZ
        ENV_SET = d; renderEnv(); refreshStart();
      }, 400);
    };
  });
}

async function jget(u){ const r = await fetch(u); if(!r.ok) throw new Error((await r.json()).detail||r.status); return r.json(); }
async function jpost(u,b){ const r = await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});
  const d = await r.json().catch(()=>({})); return {ok:r.ok, status:r.status, d}; }

// ---- init ----
(async function(){
  const m = await jget("/models"); MODELS = m.models; ENV_SET = m.env_set||{};
  renderEnv(); bindKeys();
  const sel = $("#model");
  for(const [k,v] of Object.entries(MODELS)){
    const o = document.createElement("option"); o.value=k; o.textContent=v.label;
    sel.appendChild(o);   // inaktif de SEÇİLEBİLİR (kimlik-değişimini göster); Başlat inaktifte kapalı
  }
  sel.value = Object.keys(MODELS).find(k=>MODELS[k].active) || Object.keys(MODELS)[0];
  sel.onchange = renderModel; renderModel();
  await loadProjects();
})();

function renderModel(){
  const mk = $("#model").value, m = MODELS[mk];
  $("#modelhint").textContent = m.active ? "" : "Bu model henüz aktif değil.";
  // credentials
  const c = $("#creds"); c.innerHTML = "";
  for(const cr of m.credentials){
    const wrap = document.createElement("label"); wrap.className="fld";
    wrap.innerHTML = `<span>${cr.label}${cr.required?" *":""}</span>
      <input type="${cr.secret?"password":"text"}" data-key="${cr.key}" data-secret="${cr.secret}" autocomplete="off" />
      <div class="tokline" data-status="${cr.key}"></div>`;
    c.appendChild(wrap);
    const inp = wrap.querySelector("input");
    if(cr.key==="token") inp.oninput = () => checkToken(inp);
  }
  // options
  const o = $("#opts"); o.innerHTML = "";
  for(const op of m.options||[]){
    if(op.type==="toggle"){
      const l = document.createElement("label");
      l.innerHTML = `<input type="checkbox" data-opt="${op.key}" ${op.default?"checked":""}/> ${op.label}`;
      l.title = op.note||""; o.appendChild(l);
    }
  }
  refreshStart();
}

let tkTimer=null;
function checkToken(inp){
  clearTimeout(tkTimer);
  const line = document.querySelector('[data-status="token"]');
  const v = inp.value.trim();
  if(!v){ line.innerHTML=""; refreshStart(); return; }
  line.innerHTML = `<span class="mono-sm">${mask(v)}</span><span class="badge b-idle">kontrol…</span>`;
  tkTimer = setTimeout(async ()=>{
    const {d} = await jpost("/check-token",{value:v});
    let cls = d.valid===true?"b-ok":(d.valid===false?"b-err":"b-warn");
    line.innerHTML = `<span class="mono-sm">${mask(v)}</span><span class="badge ${cls}">${d.message}</span>`;
    refreshStart();
  }, 400);
}

async function loadProjects(){
  const {projects} = await jget("/projects");
  const sel = $("#project"); sel.innerHTML = `<option value="">— seç —</option>`;
  for(const p of projects){
    const o = document.createElement("option"); o.value=p.name;
    o.textContent = `${p.name} (${p.scene_count??"?"} sahne, v${p.version??"?"})`;
    sel.appendChild(o);
  }
  window._projmap = Object.fromEntries(projects.map(p=>[p.name,p]));
  sel.onchange = onProject;
}

async function onProject(){
  const name = $("#project").value;
  const bd = $("#projbadges"), pf = $("#preflight");
  bd.innerHTML=""; pf.textContent="";
  if(!name){ refreshStart(); return; }
  const p = window._projmap[name];
  const badge=(t,c)=>`<span class="badge ${c}">${t}</span>`;
  bd.innerHTML = badge(p.has_keyframes?"keyframes ✓":"keyframes ✗", p.has_keyframes?"b-ok":"b-err")
    + badge(p.has_prompts?"prompt ✓":"prompt üretilecek", p.has_prompts?"b-ok":"b-warn");
  try{
    const d = await jget(`/project/${encodeURIComponent(name)}/preflight`);
    SCENARIO = d.scenario;
    const w = d.warnings||[];
    const scLbl = {A:"Senaryo A (prompt hazır)", B:"Senaryo B (Gemini üretecek)", "B-eksik":"Senaryo B — EKSİK (video yok)"}[d.scenario]||"";
    pf.innerHTML = `${d.scene_count} sahne · ${scLbl}`
      + (w.length? `<br><span style="color:var(--warn)">⚠ ${w.length} uyarı: ${w.slice(0,2).join("; ")}${w.length>2?"…":""}</span>`:"");
  }catch(e){ SCENARIO=null; }
  refreshStart();
}

function creds(){
  const out={};
  document.querySelectorAll('#creds input').forEach(i=>{ if(i.value.trim()) out[i.dataset.key]=i.value.trim(); });
  return out;
}
function optimizerOn(){ const c=document.querySelector('[data-opt="prompt_optimizer"]'); return c? c.checked : true; }
function getVariants(){ return "v1,v2,v3"; }   // superset; runner JSON'da dolu olanı üretir (boşu atlar)

function missingReasons(){
  const m = MODELS[$("#model").value], c = creds(), out = [];
  if(!m.active){ out.push("bu model henüz aktif değil"); return out; }
  m.credentials.forEach(cr=>{ if(cr.required && !c[cr.key]) out.push(cr.label); });
  if(!$("#project").value) out.push("Üretilecek Proje seç");
  if(SCENARIO==="B" && !ENV_SET.GEMINI_API_KEY)
    out.push("GEMINI_API_KEY yok — Senaryo B'de prompt üretimi için paneli key ile başlat");
  if(SCENARIO==="B-eksik") out.push("proje eksik: prompt yok ve kaynak video yok");
  return out;
}
function refreshStart(){
  const miss = missingReasons(), busy = !!CURRENT;
  $("#startBtn").disabled = miss.length>0 || busy;
  $("#startBtn").textContent = "Başlat";
  $("#startmsg").innerHTML = busy ? `<span style="color:var(--muted)">koşu sürüyor…</span>`
    : (miss.length ? `<span style="color:var(--warn)">Eksik: ${miss.join(" · ")}</span>` : "");
}

$("#startBtn").onclick = async ()=>{
  const body = {
    project: $("#project").value,
    provider: $("#model").value,
    variants: getVariants()||"v1",
    concurrency: parseInt($("#concurrency").value)||2,
    scenes: $("#scenes").value.trim() || null,
    credentials: creds(),
    prompt_optimizer: optimizerOn(),
  };
  $("#startmsg").textContent = "başlatılıyor…";
  const {ok,status,d} = await jpost("/start", body);
  if(!ok){ $("#startmsg").innerHTML = `<span style="color:var(--err)">${status}: ${d.detail||"hata"}</span>`; return; }
  $("#startmsg").textContent = `başladı (pid ${d.pid})`;
  CURRENT = body.project; refreshStart();
  startPolling(body.project);
};

function setLive(on,txt){ $("#livedot").style.background = on?"var(--ok)":"var(--idle)"; $("#livetxt").textContent = txt; }

function startPolling(project){
  if(POLL) clearInterval(POLL);
  const tick = async ()=>{
    let d; try{ d = await jget(`/progress/${encodeURIComponent(project)}`);}catch(e){ return; }
    renderProgress(d);
    // faz null (runstate temizlendi = durduruldu/bitti) VEYA terminal -> polling dur
    if(!d.phase || ["bitti","hata","durduruldu"].includes(d.phase)){
      clearInterval(POLL); POLL=null; CURRENT=null; refreshStart(); setLive(false, d.phase||"tamam");
    } else setLive(true, d.phase);
  };
  tick(); POLL = setInterval(tick, 4000);
}

function renderProgress(d){
  const phaseMap = {prompt_uretiliyor:["Prompt üretiliyor","p-prompt pulse"], video_uretiliyor:["Video üretiliyor","p-video pulse"],
    basliyor:["Başlıyor","p-video pulse"], bitti:["Bitti","p-done"], hata:["Hata","p-err"], durduruldu:["Durduruldu","p-err"]};
  const [ptxt,pcls] = phaseMap[d.phase] || ["Boşta","p-idle"];
  let h = `<div class="phase"><span class="pill ${pcls}">${ptxt}</span>
    <span class="mono-sm">${d.project}</span></div>`;

  if(d.phase==="prompt_uretiliyor"){
    h += `<div class="waiting">⏳ Prompt üretiliyor (Gemini) — birkaç dakika sürebilir, bekleyin.</div>`;
  } else {
    const c = d.counts||{};
    h += `<div class="stats">
      <div class="stat done"><div class="n">${c.done||0}</div><div class="k">bitti</div></div>
      <div class="stat prod"><div class="n">${c.submitted||0}</div><div class="k">üretiliyor</div></div>
      <div class="stat err"><div class="n">${c.error||0}</div><div class="k">hata</div></div>
      <div class="stat"><div class="n">${(d.softened||[]).length}</div><div class="k">softened</div></div>
    </div>`;
    if((d.producing||[]).length){
      h += `<div class="section-t">Şu an üretilen</div><ul class="list">`
        + d.producing.map(s=>`<li><span class="chip c-soft">•</span> ${s}</li>`).join("") + `</ul>`;
    }
    if((d.errors||[]).length){
      h += `<div class="section-t">Hatalar</div><ul class="list">`
        + d.errors.map(e=>`<li><span class="chip c-err">hata</span> <div><b>${e.scene}</b><div class="mono-sm">${e.error}</div></div></li>`).join("") + `</ul>`;
    }
    if((d.softened||[]).length){
      h += `<div class="section-t">S4 yumuşatma</div><ul class="list">`
        + d.softened.map(s=>`<li><span class="chip c-soft">soften #${s.attempt||"?"}</span> ${s.scene}</li>`).join("") + `</ul>`;
    }
    h += `<div class="section-t">Uyarılar &amp; günlük</div>`;
    h += (d.warnings||[]).length
      ? `<div class="warns">` + d.warnings.map(w=>`<div>${w.replace(/</g,"&lt;")}</div>`).join("") + `</div>`
      : `<div class="empty">uyarı yok</div>`;
  }

  h += `<div class="actions"><button class="ghost" id="stopBtn" ${d.alive?"":"disabled"}>Durdur</button>
        <button class="ghost" id="openBtn" style="color:var(--accent-ink);border-color:var(--accent)">Klasörü Aç</button></div>`;
  $("#progbody").innerHTML = h;
  $("#stopBtn").onclick = async ()=>{
    if(!confirm("Koşuyu durdur? (vid_id'li işler resume ile kurtarılır)")) return;
    await jpost("/stop", {});
    if(POLL){ clearInterval(POLL); POLL=null; } CURRENT=null; refreshStart(); setLive(false,"durduruldu");
    const dd = await fetch(`/progress/${encodeURIComponent(d.project)}`).then(r=>r.json()).catch(()=>null);
    if(dd){ dd.phase = dd.phase || "durduruldu"; renderProgress(dd); }
  };
  $("#openBtn").onclick = async ()=>{
    const {d:r} = await jpost("/open", {project: d.project, target: "videos"});
    if(r && r.opened) $("#openBtn").textContent = "Açıldı ✓";
  };
}
</script>
</body>
</html>
